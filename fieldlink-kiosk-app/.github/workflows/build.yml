name: Build Kiosk Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run build
        env:
          ELECTRON_GET_TIMEOUT: '120000'

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldLinkKiosk-installer
          path: dist/*.exe

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: FieldLinkKiosk Installer
          files: dist/*.exe
          make_latest: true
