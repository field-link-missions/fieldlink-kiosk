name: Build Kiosk Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run build -- --publish never
        env:
          ELECTRON_GET_TIMEOUT: '120000'

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldLinkKiosk-installer
          path: dist/*.exe

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: FieldLinkKiosk Installer
          files: dist/*.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Invalidate server installer cache
        if: success()
        run: |
          if (-not $env:SERVER_URL) { Write-Host "No SERVER_URL configured, skipping cache invalidation."; exit 0 }
          try {
            Invoke-WebRequest -Uri "$env:SERVER_URL/api/kiosk/installer/invalidate" `
              -Method POST `
              -Headers @{ "x-webhook-secret" = "$env:WEBHOOK_SECRET"; "Content-Type" = "application/json" } `
              -UseBasicParsing | Out-Null
            Write-Host "Cache invalidated successfully"
          } catch {
            Write-Host "Cache invalidation skipped: $_"
          }
        shell: pwsh
        env:
          SERVER_URL: ${{ secrets.FIELDLINK_SERVER_URL }}
          WEBHOOK_SECRET: ${{ secrets.KIOSK_WEBHOOK_SECRET }}
